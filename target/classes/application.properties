spring.application.name=return-service
server.port=8084

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/returnsdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.group-id=return-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Logging
logging.level.com.order.returns=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ── Security Enhancements ─────────────────────────────────────────────────
# Enhancement 1: JWT Secret (change in production!)
security.jwt.secret=change-me-in-production-must-be-at-least-32-chars-long
# Enhancement 4: Encryption Key (AES-256, 32 chars)
security.encryption.key=change-me-encryption-key-32chars!
# Enhancement 2: Rate Limiting
security.rate-limit.requests-per-minute=100
# Enhancement 6: GDPR
security.gdpr.data-retention-days=730
security.gdpr.anonymize-after-days=365
# Enhancement 5: PCI DSS (payment services)
security.pci.mask-card-numbers=true
security.pci.audit-all-transactions=true
# Spring Security
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/auth/realms/app
