# Monitoring Enhancement: Prometheus Alert Rules for returns
# Deploy to AlertManager alongside Prometheus scrape config.
groups:
  - name: returns_alerts
    interval: 30s
    rules:

      # ── High Error Rate ──────────────────────────────────────────────────────
      - alert: HighErrorRate_returns
        expr: |
          rate(returns_errors_total{service="returns"}[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
          service: returns
        annotations:
          summary: "High error rate on {{ $labels.service }}"
          description: "Error rate is {{ $value | humanizePercentage }} on returns"

      # ── High HTTP Latency ────────────────────────────────────────────────────
      - alert: HighLatency_returns
        expr: |
          histogram_quantile(0.95, rate(http_server_requests_seconds_bucket{service="returns"}[5m])) > 2
        for: 5m
        labels:
          severity: warning
          service: returns
        annotations:
          summary: "p95 latency above 2s on returns"
          description: "p95 latency is {{ $value }}s on returns"

      # ── Service Down ─────────────────────────────────────────────────────────
      - alert: ServiceDown_returns
        expr: |
          up{job="returns"} == 0
        for: 1m
        labels:
          severity: critical
          service: returns
        annotations:
          summary: "returns is DOWN"
          description: "returns Prometheus target is not reachable"

      # ── High Heap Memory ─────────────────────────────────────────────────────
      - alert: HighHeapMemory_returns
        expr: |
          (jvm_memory_used_bytes{service="returns",area="heap"} /
           jvm_memory_max_bytes{service="returns",area="heap"}) > 0.85
        for: 5m
        labels:
          severity: warning
          service: returns
        annotations:
          summary: "JVM Heap above 85% on returns"
          description: "Heap usage is {{ $value | humanizePercentage }} on returns"

      # ── Too Many 5xx Responses ───────────────────────────────────────────────
      - alert: High5xxRate_returns
        expr: |
          rate(http_server_requests_seconds_count{service="returns",status=~"5.."}[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
          service: returns
        annotations:
          summary: "High 5xx rate on returns"
          description: "5xx rate is {{ $value | humanize }} req/s on returns"

      # ── High CPU Usage ───────────────────────────────────────────────────────
      - alert: HighCpuUsage_returns
        expr: |
          process_cpu_usage{service="returns"} > 0.80
        for: 5m
        labels:
          severity: warning
          service: returns
        annotations:
          summary: "CPU above 80% on returns"
          description: "CPU usage is {{ $value | humanizePercentage }} on returns"
